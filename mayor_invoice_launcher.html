<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayor Invoice Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f4; color: #1a1a18; padding: 2rem 1rem; }
  .container { max-width: 600px; margin: 0 auto; }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .field { margin-bottom: 10px; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: inherit; background: #fff; color: #1a1a18; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, textarea:focus { outline: 2px solid #378add; outline-offset: 1px; }
  input[readonly] { background: #f9f9f8; color: #555; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  button.primary { width: 100%; padding: 11px; font-size: 14px; font-family: inherit; border: none; border-radius: 8px; background: #1a1a18; color: white; cursor: pointer; }
  button.primary:hover { background: #333; }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  .status { margin-top: 10px; font-size: 13px; padding: 10px 12px; border-radius: 8px; display: none; }
  .success { background: #eaf3de; color: #3b6d11; display: block; }
  .error   { background: #fcebeb; color: #a32d2d; display: block; }
  .loading { background: #e6f1fb; color: #185fa5; display: block; }
  .toggle { font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; margin-top: 4px; width: auto; }
  .item-block { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0f0ee; }
  .item-block:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .item-label { font-size: 11px; font-weight: 500; color: #666; margin-bottom: 6px; }
  .fee-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; padding-top: 22px; }
  .checkbox-row input[type="checkbox"] { width: auto; margin: 0; }
  .checkbox-row label { font-size: 12px; color: #666; margin: 0; white-space: nowrap; }
  .totals-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .subtotal-display { background: #f9f9f8; border-radius: 8px; padding: 10px 12px; font-size: 13px; display: flex; justify-content: space-between; margin-top: 8px; }
  .subtotal-display span:first-child { color: #888; }
  .subtotal-display span:last-child { font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Mayor</div>

  <div class="card">
    <p class="section-title">Order Info</p>
    <div class="row2">
      <div class="field"><label>Order Number</label><input id="order_number" /></div>
      <div class="field"><label>Club</label><input id="club" /></div>
    </div>
    <div class="field">
      <label>Shipping / Billing Address</label>
      <textarea id="address" rows="3" placeholder="Club Name&#10;Attn: Name&#10;Street&#10;City, State ZIP"></textarea>
    </div>
    <div class="row2">
      <div class="field"><label>Ship Date</label><input id="ship_date" placeholder="Friday, May 29, 2026" /></div>
      <div class="field"><label>Payment Link (Nickel)</label><input id="payment_link" placeholder="https://nickel.com/pay/..." /></div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">Line Items</p>
    <div id="items-container"></div>
    <div style="display:flex; gap:10px; margin-top:8px; flex-wrap:wrap;">
      <button class="toggle" id="btn-add" onclick="addItem()">+ Add item</button>
      <button class="toggle" id="btn-remove" onclick="removeItem()" style="display:none;">− Remove last item</button>
    </div>

    <div style="margin-top:14px; padding-top:14px; border-top:1px solid #f0f0ee;">
      <div class="row2">
        <div class="subtotal-display"><span>Total Quantity</span><span id="total-qty-display">0</span></div>
        <div class="subtotal-display"><span>Subtotal Price</span><span id="total-price-display">$0.00</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">Fees</p>
    <div class="fee-row">
      <div class="field"><label>Embroidery Fee</label><input id="embroidery" type="number" step="0.01" placeholder="0.00" oninput="calcTotals()" /></div>
      <div class="field"><label>Art Fee</label><input id="art_setup" type="number" step="0.01" placeholder="0.00" oninput="calcTotals()" /></div>
      <div style="padding-bottom:10px;"></div>
    </div>
    <div class="row2">
      <div class="checkbox-row" style="padding-top:0;">
        <input type="checkbox" id="strike_embroidery" checked />
        <label for="strike_embroidery">Cross out embroidery</label>
      </div>
      <div class="checkbox-row" style="padding-top:0;">
        <input type="checkbox" id="strike_art" checked />
        <label for="strike_art">Cross out art fee</label>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">Totals</p>
    <div class="row3">
      <div class="field"><label>Shipping</label><input id="shipping" type="number" step="0.01" placeholder="0.00" oninput="calcTotals()" /></div>
      <div class="field"><label>Subtotal (auto)</label><input id="subtotal" type="number" step="0.01" readonly /></div>
      <div class="field"><label>Total (auto)</label><input id="total" type="number" step="0.01" readonly /></div>
    </div>
  </div>

  <button class="primary" id="gen-btn" onclick="generate()">Generate Invoice PDF</button>
  <div class="status" id="status"></div>
</div>

<script>
let itemCount = 0;

function addItem() {
  itemCount++;
  const n = itemCount;
  const div = document.createElement('div');
  div.className = 'item-block';
  div.id = 'item-block-' + n;
  div.innerHTML = `
    <p class="item-label">Item ${n}</p>
    <div class="field"><label>Product URL</label><input id="url_${n}" placeholder="https://mayorclothing.com/products/..." /></div>
    <div class="field"><label>Description (verbatim)</label><textarea id="desc_${n}" rows="4"></textarea></div>
    <div class="row4">
      <div class="field"><label>Qty</label><input id="qty_${n}" type="number" placeholder="24" oninput="calcItem(${n})" /></div>
      <div class="field"><label>Price</label><input id="price_${n}" type="number" step="0.01" placeholder="49.00" oninput="calcItem(${n})" /></div>
      <div class="field"><label>Amount (auto)</label><input id="amount_${n}" type="number" step="0.01" readonly /></div>
    </div>`;
  document.getElementById('items-container').appendChild(div);
  document.getElementById('btn-remove').style.display = itemCount > 1 ? '' : 'none';
}

function removeItem() {
  if (itemCount < 2) return;
  document.getElementById('item-block-' + itemCount).remove();
  itemCount--;
  document.getElementById('btn-remove').style.display = itemCount > 1 ? '' : 'none';
  calcTotals();
}

function calcItem(n) {
  const qty   = parseFloat(document.getElementById('qty_' + n).value) || 0;
  const price = parseFloat(document.getElementById('price_' + n).value) || 0;
  const amt   = qty * price;
  document.getElementById('amount_' + n).value = amt > 0 ? amt.toFixed(2) : '';
  calcTotals();
}

function calcTotals() {
  let totalQty = 0, totalAmt = 0;
  for (let i = 1; i <= itemCount; i++) {
    totalQty += parseFloat(document.getElementById('qty_' + i)?.value) || 0;
    totalAmt += parseFloat(document.getElementById('amount_' + i)?.value) || 0;
  }

  document.getElementById('total-qty-display').textContent = totalQty;
  document.getElementById('total-price-display').textContent = '$' + totalAmt.toFixed(2);
  document.getElementById('subtotal').value = totalAmt > 0 ? totalAmt.toFixed(2) : '';

  const shipping = parseFloat(document.getElementById('shipping').value) || 0;
  const grandTotal = totalAmt + shipping;
  document.getElementById('total').value = grandTotal > 0 ? grandTotal.toFixed(2) : '';
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function num(id) { const el = document.getElementById(id); return parseFloat(el?.value) || 0; }
function checked(id) { const el = document.getElementById(id); return el ? el.checked : false; }

async function generate() {
  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = 'Generating invoice…';

  const lineItems = [];
  for (let i = 1; i <= itemCount; i++) {
    const qty = num('qty_' + i);
    const desc = val('desc_' + i);
    if (!qty && !desc) continue;
    lineItems.push({
      product: 'Custom Print Polo',
      url: val('url_' + i),
      description: desc,
      quantity: qty,
      price: num('price_' + i),
      amount: num('amount_' + i)
    });
  }

  const embroidery = num('embroidery');
  const artSetup   = num('art_setup');

  const payload = {
    order_number: val('order_number'),
    club:         val('club'),
    address:      val('address'),
    ship_date:    val('ship_date'),
    payment_link: val('payment_link'),
    line_items:   lineItems,
    subtotal:     num('subtotal'),
    embroidery:   embroidery || null,
    strike_embroidery: checked('strike_embroidery'),
    art_setup:    artSetup || null,
    strike_art:   checked('strike_art'),
    shipping:     num('shipping'),
    total:        num('total')
  };

  try {
    const res = await fetch('https://mayor-invoice.onrender.com/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Mayor-Invoice-${payload.order_number || 'draft'}.pdf`;
    a.click();
    status.className = 'status success';
    status.textContent = '✓ Invoice downloaded!';
  } catch(e) {
    status.className = 'status error';
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

// Start with 1 item
addItem();
</script>
</body>
</html>
